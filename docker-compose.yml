version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: yanxiaomap-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: yanxiaomap
      MYSQL_USER: yanxiaomap
      MYSQL_PASSWORD: yanxiaomap123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Redis缓存
  redis:
    image: redis:6-alpine
    container_name: yanxiaomap-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # 后端应用
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yanxiaomap-backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DATABASE_URL: jdbc:mysql://mysql:3306/yanxiaomap?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
      DATABASE_USERNAME: root
      DATABASE_PASSWORD: root
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AMAP_API_KEY: ${AMAP_API_KEY:-demo_key}
      AMAP_SECURITY_KEY: ${AMAP_SECURITY_KEY:-demo_security_key}
      JWT_SECRET: ${JWT_SECRET:-yanxiaomap_jwt_secret_key_2026}
      JWT_EXPIRATION: 86400000
    ports:
      - "8080:8080"
    volumes:
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mysql_data:
  redis_data: